<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaludCompartida - Lanzamiento</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f7b6c 0%, #14a085 50%, #1abc9c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      max-width: 640px;
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .logo span {
      color: #a8f0e0;
    }

    .tagline {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 2.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 1rem;
      padding: 2rem;
      backdrop-filter: blur(10px);
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .card p {
      line-height: 1.6;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      background: #fff;
      color: #0f7b6c;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-top: 1.5rem;
    }

    .footer {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Salud<span>Compartida</span></div>
    <p class="tagline">Salud para todos, juntos.</p>

    <div class="card">
      <h2>¡Próximamente!</h2>
      <p>
        Estamos preparando algo especial para ti. SaludCompartida es la plataforma
        donde la salud se convierte en una experiencia compartida, accesible y humana.
      </p>
      <span class="badge">Lanzamiento en camino</span>
    </div>

    <p class="footer">&copy; 2026 SaludCompartida. Todos los derechos reservados.</p>
  </div>
</body>
</html>
